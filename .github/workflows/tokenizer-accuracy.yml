name: Tokenizer Accuracy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test-accuracy:
    name: Test tokenizer accuracy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('crates/tokie/tests/accuracy.rs') }}
          restore-keys: hf-models-

      - name: Cache enwik8 test data
        uses: actions/cache@v4
        with:
          path: benches/data/enwik8
          key: enwik8-100mb

      - name: Download enwik8 test data
        run: |
          mkdir -p benches/data
          if [ ! -f benches/data/enwik8 ]; then
            curl -L "https://mattmahoney.net/dc/enwik8.zip" -o /tmp/enwik8.zip
            unzip -o /tmp/enwik8.zip -d benches/data/
          fi

      - name: Run tokenizer accuracy tests
        run: cargo test -p tokie --test accuracy --features build -- --ignored
